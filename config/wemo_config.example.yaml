# Wemo device configuration template
# Copy this file to wemo_config.yaml and fill in real local device addresses.
#
# Safety note: wemo_config.yaml contains local network topology and must stay private.
# scripts/refresh_wemo_devices.py can discover devices and generate a local config.

devices:
  - name: "Kitchen Switch"
    host: "192.0.2.20"
    port: 49153
    type: "Switch"
    description: "Example kitchen switch"

  - name: "Desk Light"
    host: "192.0.2.21"
    port: 49153
    type: "LightSwitchLongPress"
    description: "Example desk light"

  - name: "Accent Light"
    host: "192.0.2.22"
    port: 49153
    type: "Insight"
    description: "Example insight switch"

  - name: "Plant Light"
    host: "192.0.2.23"
    port: 49153
    type: "Insight"
    description: "Example plant light"

# Optional local schedules
schedule:
  timezone: "America/Los_Angeles"
  tasks:
    - time: "08:00"
      device: "Kitchen Switch"
      action: "on"
      description: "Example morning on schedule"
    - time: "10:00"
      device: "Kitchen Switch"
      action: "off"
      description: "Example morning off schedule"
